<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Casa & Canil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; }
        .header-nav { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; align-items: center; gap: 10px; width: 30%; }
        .nav-center { flex-grow: 1; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .nav-right { width: 30%; text-align: right; }
        .btn-custom { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; }
        .form-control { background: rgba(255,255,255,0.9) !important; border-radius: 8px; }
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4); text-decoration: none; }
        .client-card { background: rgba(255,255,255,0.08); border: none; border-left: 5px solid #555; margin-bottom: 12px; transition: 0.3s; cursor: pointer; }
        .client-card.danger { border-left-color: var(--primary); background: rgba(211, 47, 47, 0.1); }
        .client-card.ok { border-left-color: #2e7d32; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>
    <div class="header-nav">
        <div class="nav-left"><a href="pagina.html" class="btn btn-sm btn-outline-light">←</a></div>
        <div class="nav-center">CLIENTES</div>
        <div class="nav-right"></div>
    </div>

    <div class="container mt-3 pb-5">
        <input type="text" id="searchClient" class="form-control mb-3" placeholder="Buscar por nome ou CPF...">
        <div id="listaFull"></div>
    </div>

    <button class="fab" data-bs-toggle="modal" data-bs-target="#modalAdd">+</button>

    <div class="modal fade" id="modalAdd" tabindex="-1">
        <div class="modal-dialog modal-fullscreen-sm-down">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary"><h5 id="modalTitle">Novo Cliente</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <label class="small opacity-50">Nome Completo</label>
                    <input type="text" id="cNome" class="form-control mb-2">
                    <label class="small opacity-50">CPF</label>
                    <input type="text" id="cCPF" class="form-control mb-2">
                    <label class="small opacity-50">E-mail</label>
                    <input type="email" id="cEmail" class="form-control mb-2">
                    <label class="small opacity-50">Telefone</label>
                    <input type="text" id="cTel" class="form-control mb-2">
                    <label class="small opacity-50">Endereço</label>
                    <input type="text" id="cEnd" class="form-control mb-2">
                    <label class="small opacity-50">Limite de Crédito R$</label>
                    <input type="number" id="cLim" class="form-control mb-3">
                    <button class="btn btn-custom w-100" id="btnSalvar">Salvar Cadastro</button>
                    <button class="btn btn-outline-danger w-100 mt-2" id="btnExcluir" style="display:none;">Excluir Cliente</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="clientes.js"></script>
</body>
</html>
